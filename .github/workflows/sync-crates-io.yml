name: sync-crates-io

on:
  schedule:
    # Run every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      crates:
        description: "Space-separated list of crate names to sync (defaults to gnostr)"
        required: false
        default: "gnostr"

jobs:
  build:
    name: Build margo binary
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust
        uses: ./.github/actions/cargo-cache
        with:
          key: sync-build

      - name: Build margo with sync-crates-io feature
        run: cargo build --release --features sync-crates-io

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: margo-sync
          path: target/release/margo

  sync:
    name: Sync crates from crates.io
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download margo binary
        uses: actions/download-artifact@v4
        with:
          name: margo-sync
          path: .

      - name: Make margo executable
        run: chmod +x ./margo

      - name: Determine crates to sync
        id: crates
        run: |
          CRATES="${{ github.event.inputs.crates || 'gnostr' }}"
          echo "crates=${CRATES}" >> "$GITHUB_OUTPUT"

      - name: Initialize registry if needed
        run: |
          if [ ! -f config.json ]; then
            ./margo init \
              --defaults \
              --base-url "https://gnostr-org.github.io/gnostr-registry/" \
              .
          fi

      - name: Sync crates from crates.io
        run: |
          ./margo sync --registry . ${{ steps.crates.outputs.crates }}

      - name: Commit and push changes
        run: |
          git config user.email "sync-bot@gnostr-registry"
          git config user.name "gnostr-registry sync bot"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync crates from crates.io [skip ci]"
            git push origin gh-pages
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-sync:
    name: Verify crates.io synchronization
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust
        uses: ./.github/actions/cargo-cache
        with:
          key: verify-sync

      - name: Run crates.io sync tests
        run: |
          cargo test \
            --features sync-crates-io \
            -- \
            --ignored \
            crates_io::tests
